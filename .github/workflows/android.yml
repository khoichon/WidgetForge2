name: Build and Release Android App

on:
  push:

jobs:
  build:
    name: Build APK & Determine Version
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.versioning.outputs.VERSION_TAG }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Tag
        id: versioning
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            echo "Triggered by a pushed tag: $TAG_NAME"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            
            if [ -z "$LATEST_TAG" ]; then
              TAG_NAME="v1.0.0"
              echo "No tags found anywhere in history. Defaulting to: $TAG_NAME"
            else
              CLEAN_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
              IFS='.' read -r major minor patch <<< "$CLEAN_VERSION"
              
              major=${major:-1}
              minor=${minor:-0}
              patch=${patch:-0}
              new_patch=$((patch + 1))
              
              TAG_NAME="v$major.$minor.$new_patch"
              echo "Found latest tag $LATEST_TAG. Incrementing patch to: $TAG_NAME"
            fi
          fi
          echo "VERSION_TAG=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'
      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore /home/runner/work/widgetforge/widgetforge/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
    
      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Built APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Push Created Tag to Git Tree
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          if ! git rev-parse "${{ needs.build.outputs.version_tag }}" >/dev/null 2>&1; then
            git tag "${{ needs.build.outputs.version_tag }}"
            git push origin "${{ needs.build.outputs.version_tag }}"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-debug.apk
          tag_name: ${{ needs.build.outputs.version_tag }}
          name: Release ${{ needs.build.outputs.version_tag }}
          draft: false
          prerelease: false
